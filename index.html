<!doctype html>
<html lang="no">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Morgen-dashboard</title>
<style>
body{margin:0;background:#070b12;color:white;font-family:Arial,sans-serif;padding:20px}
.top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px}
#clock{font-size:72px;font-weight:800}
#date{text-align:right;font-size:26px;opacity:.9}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.card{background:#111824;border:1px solid #263346;border-radius:20px;padding:16px;box-shadow:0 10px 30px #0008}
h2{margin:0 0 8px;font-size:28px}
.now{display:flex;align-items:center;gap:14px;margin:10px 0 14px}
.icon{font-size:48px}.temp{font-size:52px;font-weight:800}
.meta{font-size:17px;opacity:.85;line-height:1.4}
.hours{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-top:12px}
.hour{background:#0b111b;border-radius:12px;padding:10px;text-align:center}
.hour .t{font-size:15px;opacity:.8}.hour .i{font-size:26px;margin:6px 0}.hour .c{font-size:22px;font-weight:700}
.bottom{display:grid;grid-template-columns:1fr 1.25fr;gap:14px;margin-top:14px}
.big{font-size:30px;font-weight:800}.muted{opacity:.75;font-size:18px;line-height:1.45}
.ok{color:#8df58d}.warn{color:#ffd36b}.bad{color:#ff8a8a}
.calendar{width:100%;border-collapse:collapse;margin-top:8px}
.calendar th,.calendar td{text-align:center;padding:5px;font-size:16px}
.calendar th{opacity:.7}
.calendar .weekno{opacity:.55}
.calendar .today{background:#2b6cff;border-radius:8px;font-weight:800}
</style>
</head>
<body>

<div class="top">
  <div id="clock">--:--</div>
  <div id="date"></div>
</div>

<div class="grid" id="weather"></div>

<div class="bottom">
  <div class="card">
    <h2>Tog til jobb</h2>
    <div class="muted">Lillehammer → Hamar</div>
    <div id="train" class="big">Henter togstatus...</div>
    <div id="trainDetails" class="muted"></div>
  </div>

  <div class="card">
    <h2 id="calTitle">Kalender</h2>
    <div id="calendar"></div>
  </div>
</div>

<script>
const steder = [
  {navn:"Lillehammer", lat:61.1153, lon:10.4662},
  {navn:"Hamar", lat:60.7945, lon:11.0679},
  {navn:"Bærum", lat:59.9205, lon:10.5938}
];

function icon(code){
  if(code===0) return "☀️";
  if([1,2].includes(code)) return "🌤️";
  if(code===3) return "☁️";
  if([45,48].includes(code)) return "🌫️";
  if([51,53,55,61,63,65,80,81,82].includes(code)) return "🌧️";
  if([71,73,75,77,85,86].includes(code)) return "❄️";
  if([95,96,99].includes(code)) return "⛈️";
  return "🌡️";
}

function desc(code){
  if(code===0) return "Klart";
  if([1,2].includes(code)) return "Delvis skyet";
  if(code===3) return "Overskyet";
  if([45,48].includes(code)) return "Tåke";
  if([51,53,55].includes(code)) return "Yr";
  if([61,63,65,80,81,82].includes(code)) return "Regn";
  if([71,73,75,77,85,86].includes(code)) return "Snø";
  if([95,96,99].includes(code)) return "Torden";
  return "Vær";
}

function isoWeek(d){
  const date = new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
  const dayNum = date.getUTCDay() || 7;
  date.setUTCDate(date.getUTCDate()+4-dayNum);
  const yearStart = new Date(Date.UTC(date.getUTCFullYear(),0,1));
  return Math.ceil((((date-yearStart)/86400000)+1)/7);
}

function updateClock(){
  const n = new Date();
  clock.textContent = n.toLocaleTimeString("no-NO",{hour:"2-digit",minute:"2-digit"});
  date.innerHTML = n.toLocaleDateString("no-NO",{weekday:"long",day:"numeric",month:"long"})+"<br>Uke "+isoWeek(n);
}

async function hentVaer(sted){
  const url=`https://api.open-meteo.com/v1/forecast?latitude=${sted.lat}&longitude=${sted.lon}&hourly=temperature_2m,precipitation,weather_code,wind_speed_10m&forecast_days=3&timezone=Europe%2FOslo`;
  const r=await fetch(url);
  const data=await r.json();

  const now=new Date();
  const times=data.hourly.time.map(t=>new Date(t));
  const h=data.hourly;

  let idx=times.findIndex(t=>t>=now);
  if(idx<0) idx=0;

  const currentHour = now.getHours();
  const blockStarts = [0,6,12,18];
  let currentBlockStart = 0;
  for (const b of blockStarts) {
    if (currentHour >= b) currentBlockStart = b;
  }

  const slots = [];

  for(let n=0;n<4;n++){
    const start = new Date(now);

    if(n===0){
      start.setHours(currentHour,0,0,0);
    } else {
      start.setHours(currentBlockStart + n*6,0,0,0);
      while(start <= now){
        start.setDate(start.getDate()+1);
      }
    }

    const end = new Date(start);

    if(n===0){
      const nextBlock = new Date(now);
      nextBlock.setHours(currentBlockStart + 6,0,0,0);
      if(nextBlock <= now) nextBlock.setDate(nextBlock.getDate()+1);
      end.setTime(nextBlock.getTime());
    } else {
      end.setHours(start.getHours()+6,0,0,0);
    }

    let indexes = times
      .map((t,i)=>({t,i}))
      .filter(x=>x.t>=start && x.t<end)
      .map(x=>x.i);

    if(indexes.length===0){
      let best=0, diff=Infinity;
      times.forEach((t,i)=>{
        const d=Math.abs(t-start);
        if(d<diff){diff=d;best=i;}
      });
      indexes=[best];
    }

    const temps = indexes.map(i=>h.temperature_2m[i]);
    const precip = indexes.reduce((sum,i)=>sum + h.precipitation[i],0);

    const code = indexes
      .map(i=>h.weather_code[i])
      .sort((a,b)=>
        indexes.filter(i=>h.weather_code[i]===b).length -
        indexes.filter(i=>h.weather_code[i]===a).length
      )[0];

    const avgTemp = Math.round(temps.reduce((a,b)=>a+b,0)/temps.length);

    slots.push({
      label: `${start.toLocaleTimeString("no-NO",{hour:"2-digit",minute:"2-digit"})}–${end.toLocaleTimeString("no-NO",{hour:"2-digit",minute:"2-digit"})}`,
      temp: avgTemp,
      precip,
      code
    });
  }

  const next24End = new Date(now.getTime()+24*60*60*1000);
  const next24Indexes = times
    .map((t,i)=>({t,i}))
    .filter(x=>x.t>=now && x.t<=next24End)
    .map(x=>x.i);

  const temps24 = next24Indexes.map(i=>h.temperature_2m[i]);
  const min24 = Math.round(Math.min(...temps24));
  const max24 = Math.round(Math.max(...temps24));
  const precip24 = next24Indexes.reduce((sum,i)=>sum + h.precipitation[i],0);

  return `<div class="card">
    <h2>${sted.navn}</h2>
    <div class="meta">Neste 24 t: ${min24}° / ${max24}° · Nedbør ${precip24.toFixed(1)} mm</div>
    <div class="now"><div class="icon">${icon(h.weather_code[idx])}</div><div>
      <div class="temp">${Math.round(h.temperature_2m[idx])}°</div>
      <div class="meta">${desc(h.weather_code[idx])}<br>Vind ${Math.round(h.wind_speed_10m[idx])} km/t · ${h.precipitation[idx].toFixed(1)} mm</div>
    </div></div>
    <div class="hours">${slots.map(s=>`<div class="hour">
      <div class="t">${s.label}</div>
      <div class="i">${icon(s.code)}</div>
      <div class="c">${s.temp}°</div>
      <div class="t">${s.precip.toFixed(1)} mm</div>
    </div>`).join("")}</div>
  </div>`;
}

async function tegnVaer(){
  weather.innerHTML="Laster vær...";
  weather.innerHTML=(await Promise.all(steder.map(hentVaer))).join("");
}

function drawCalendar(){
  const now=new Date();
  const year=now.getFullYear(), month=now.getMonth();
  calTitle.textContent = now.toLocaleDateString("no-NO",{month:"long",year:"numeric"});
  const first=new Date(year,month,1);
  const last=new Date(year,month+1,0);
  const start=new Date(first);
  start.setDate(first.getDate()-((first.getDay()+6)%7));

  let html=`<table class="calendar">
    <tr><th>Uke</th><th>Ma</th><th>Ti</th><th>On</th><th>To</th><th>Fr</th><th>Lø</th><th>Sø</th></tr>`;

  for(let w=0;w<6;w++){
    html+=`<tr><td class="weekno">${isoWeek(start)}</td>`;
    for(let d=0;d<7;d++){
      const cls = start.toDateString()===now.toDateString() ? "today" : "";
      const faded = start.getMonth()!==month ? "opacity:.25" : "";
      html+=`<td style="${faded}"><div class="${cls}">${start.getDate()}</div></td>`;
      start.setDate(start.getDate()+1);
    }
    html+="</tr>";
    if(start>last && start.getDay()===1) break;
  }

  html+="</table>";
  calendar.innerHTML=html;
}

async function hentTog(){
  const query = `
  {
    stopPlace(id: "NSR:StopPlace:420") {
      id
      name
      estimatedCalls(
        timeRange: 14400
        numberOfDepartures: 20
        whiteListed: {modes: [rail]}
      ) {
        aimedDepartureTime
        expectedDepartureTime
        destinationDisplay {
          frontText
        }
        serviceJourney {
          journeyPattern {
            line {
              publicCode
              name
              transportMode
            }
          }
        }
        quay {
          publicCode
        }
        situations {
          summary {
            value
          }
          description {
            value
          }
        }
      }
    }
  }`;

  try {
    const r = await fetch("https://api.entur.io/journey-planner/v3/graphql", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "ET-Client-Name": "hakon-morgen-dashboard"
      },
      body: JSON.stringify({ query })
    });

    const json = await r.json();

    if (json.errors) {
      throw new Error(json.errors[0].message);
    }

    const calls = json.data?.stopPlace?.estimatedCalls || [];

    const relevant = calls.filter(c => {
      const dest = (c.destinationDisplay?.frontText || "").toLowerCase();
      const lineName = (c.serviceJourney?.journeyPattern?.line?.name || "").toLowerCase();
      const code = (c.serviceJourney?.journeyPattern?.line?.publicCode || "").toLowerCase();

      return (
        dest.includes("hamar") ||
        dest.includes("oslo") ||
        dest.includes("drammen") ||
        lineName.includes("hamar") ||
        lineName.includes("oslo") ||
        code.includes("r10") ||
        code.includes("r60") ||
        code.includes("r70")
      );
    });

    let target = relevant.find(c => {
      const t = new Date(c.aimedDepartureTime);
      return t.getHours() === 7 && Math.abs(t.getMinutes() - 14) <= 20;
    }) || relevant[0];

    if (!target) {
      throw new Error("Fant ingen relevant togavgang fra Lillehammer");
    }

    const aimed = new Date(target.aimedDepartureTime);
    const expected = new Date(target.expectedDepartureTime || target.aimedDepartureTime);
    const delay = Math.round((expected - aimed) / 60000);

    const line = target.serviceJourney?.journeyPattern?.line;
    const lineText = `${line?.publicCode || ""} ${line?.name || ""}`.trim();
    const destination = target.destinationDisplay?.frontText || "ukjent retning";
    const track = target.quay?.publicCode || "ikke oppgitt";

    let cls = "ok";
    let status = "I rute";

    if (delay > 2 && delay < 10) {
      cls = "warn";
      status = `${delay} min forsinket`;
    }

    if (delay >= 10) {
      cls = "bad";
      status = `${delay} min forsinket`;
    }

    const situationText = target.situations?.length
      ? target.situations.map(s => s.summary?.[0]?.value || s.description?.[0]?.value || "").filter(Boolean).join("<br>")
      : "";

    train.innerHTML = `<span class="${cls}">${status}</span>`;

    trainDetails.innerHTML =
      `Avgang: ${aimed.toLocaleTimeString("no-NO",{hour:"2-digit",minute:"2-digit"})}` +
      `<br>Forventet: ${expected.toLocaleTimeString("no-NO",{hour:"2-digit",minute:"2-digit"})}` +
      `<br>Retning: ${destination}` +
      `<br>Linje: ${lineText || "ikke oppgitt"}` +
      `<br>Spor/plattform: ${track}` +
      (situationText ? `<br><span class="bad">Varsel: ${situationText}</span>` : "");
  } catch(e) {
    train.innerHTML = `<span class="warn">Kunne ikke hente sanntid</span>`;
    trainDetails.innerHTML = `Sjekk Entur/Vy manuelt. Feil: ${e.message}`;
  }
}

updateClock();
drawCalendar();
tegnVaer();
hentTog();

setInterval(updateClock,10000);
setInterval(tegnVaer,15*60*1000);
setInterval(hentTog,5*60*1000);
</script>
</body>
</html>
